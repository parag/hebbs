[llm]
conversation_provider = "openai"
conversation_model = "gpt-4o-mini"
extraction_provider = "openai"
extraction_model = "gpt-4o-mini"

[llm.openai]
api_key_env = "OPENAI_API_KEY"
model = "gpt-4o-mini"

[embedding]
provider = "onnx"

[embedding.onnx]
model = "bge-small-en-v1.5"

[hebbs]
data_dir = "./hebbs-data"
