[llm]
conversation_provider = "openai"
conversation_model = "gpt-4o-mini"
extraction_provider = "openai"
extraction_model = "gpt-4o-mini"

[llm.openai]
api_key_env = "OPENAI_API_KEY"
model = "gpt-4o-mini"

[embedding]
provider = "openai"

[embedding.openai]
api_key_env = "OPENAI_API_KEY"
model = "text-embedding-3-small"

[hebbs]
data_dir = "./hebbs-data-openai-embed"

[hebbs.reflect]
provider = "openai"
model = "gpt-4o-mini"
threshold = 20
