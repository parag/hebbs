name: Release

on:
  push:
    tags:
      - "v*"
      - "py-v*"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  bench-full:
    name: Full Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build -p hebbs-bench --release
      - name: Run full benchmarks
        run: ./target/release/hebbs-bench all --tier standard --output release-bench.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-benchmarks
          path: release-bench.json

  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: hebbs-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: hebbs-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: hebbs-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p hebbs-server -p hebbs-cli -p hebbs-bench
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hebbs-server dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/hebbs-cli dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/hebbs-bench dist/ 2>/dev/null || true
          tar czf ${{ matrix.artifact }}.tar.gz -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-smoke-test:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_ENV"

      - name: Start container
        run: |
          docker run -d \
            --name hebbs-smoke \
            -p 6380:6380 \
            -p 6381:6381 \
            -e HEBBS_AUTH_ENABLED=false \
            "${IMAGE}"

      - name: Wait for health check
        run: |
          echo "Waiting for HEBBS to become ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:6381/v1/health/ready > /dev/null 2>&1; then
              echo "HEBBS is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for HEBBS readiness"
          docker logs hebbs-smoke
          exit 1

      - name: Verify metrics endpoint
        run: |
          curl -sf http://localhost:6381/v1/metrics | head -5
          echo "Metrics endpoint OK"

      - name: Verify REST health
        run: |
          curl -sf http://localhost:6381/v1/health/live
          echo ""
          curl -sf http://localhost:6381/v1/health/ready
          echo ""
          echo "Health endpoints OK"

      - name: Cleanup
        if: always()
        run: |
          docker stop hebbs-smoke 2>/dev/null || true
          docker rm hebbs-smoke 2>/dev/null || true

  build-python-wheels:
    name: Python wheel (${{ matrix.os }}-${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/py-v')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
          - os: macos-latest
            target: aarch64
          - os: macos-13
            target: x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/hebbs-python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux || 'auto' }}
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: crates/hebbs-python/dist/

  python-sdist:
    name: Python sdist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/py-v')
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/hebbs-python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: crates/hebbs-python/dist/

  create-release:
    name: Create Release
    needs: [build-binaries, bench-full, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    needs: [build-python-wheels, python-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/py-v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: python-*
          merge-multiple: true
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
